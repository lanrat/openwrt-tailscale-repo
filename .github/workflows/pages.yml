# Workflow for building and deploying the opkg repo to GitHub Pages
name: build and update repo

on:
  push:
    branches: ["main"]

  schedule:
    # Runs "At 06:30 on Tuesday." (see https://crontab.guru)
    - cron: '30 6 * * 2'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          # tailscale is cloned at build time, so there is no go.sum at the repo
          # root for setup-go's default caching to key on; cache explicitly.
          cache: false

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          # The tailscale version is resolved inside build.sh and is unknown
          # here, so use a unique save key per run and restore the most recent
          # prior cache; this keeps modules/build cache fresh across versions.
          key: ${{ runner.os }}-go-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install UPX
        run: sudo apt-get install -yqq upx

      - name: Build IPK files
        run: ./build.sh "${{ github.event_name }}"

      - name: Check new package existence
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: "packages/19.07/Packages"

      - name: Sign Packages index
        if: ${{ steps.check_files.outputs.files_exists == 'true' && env.SIGNING_KEY != '' }}
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          sudo apt-get install -yqq signify-openbsd
          TMPDIR=$(mktemp -d)
          echo "$SIGNING_KEY" > "$TMPDIR/key.sec"
          signify-openbsd -S -s "$TMPDIR/key.sec" -m packages/19.07/Packages -x packages/19.07/Packages.sig
          rm -rf "$TMPDIR"

      - name: Prep GH Pages Directory
        if: ${{ (github.ref == 'refs/heads/main') && (steps.check_files.outputs.files_exists == 'true') }}
        run: |
          cp -r ./html ./gh_pages
          mv ./packages/ gh_pages/packages/
          cp -r ./keys gh_pages/keys
          ./tools/gen_directory_listing.sh ./gh_pages/packages/19.07/

      - name: Upload Pages artifact
        if: ${{ (github.ref == 'refs/heads/main') && (steps.check_files.outputs.files_exists == 'true') }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./gh_pages

      - name: Deploy to GitHub Pages
        if: ${{ (github.ref == 'refs/heads/main') && (steps.check_files.outputs.files_exists == 'true') }}
        id: deployment
        uses: actions/deploy-pages@v5
